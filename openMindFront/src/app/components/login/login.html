<app-navbar></app-navbar>

<div
    class="relative min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-100 via-slate-50 to-blue-50 overflow-hidden">

    <!-- Decoración sutil (sin animaciones) -->
    <div aria-hidden="true" class="absolute -top-32 -left-32 w-96 h-96 bg-blue-300/20 rounded-full blur-3xl"></div>
    <div aria-hidden="true" class="absolute -bottom-32 -right-32 w-96 h-96 bg-indigo-300/20 rounded-full blur-3xl">
    </div>

    <div class="relative w-full max-w-md rounded-3xl border border-slate-200 bg-white/90 backdrop-blur p-10 shadow-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="mx-auto mb-4 inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold tracking-tight text-slate-800">¡Hola de nuevo!</h2>
            <p class="mt-1 text-slate-500">Ingresa tus credenciales para continuar</p>

        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Correo Electrónico</label>
                <div class="relative">
                    <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 12H8m8 0l-8 0m8 0l-8 0" />
                        </svg>
                    </span>

                    <input type="email" formControlName="email" placeholder="nombre@ejemplo.com"
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20" />
                </div>

                <!-- hint -->
                <p class="mt-2 text-xs text-slate-500">Usa el correo con el que te registraste.</p>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                <div class="relative">
                    <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 11c0 .552-.448 1-1 1s-1-.448-1-1 .448-1 1-1 1 .448 1 1z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 11V7a5 5 0 00-10 0v4" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M5 11h14v8a2 2 0 01-2 2H7a2 2 0 01-2-2v-8z" />
                        </svg>
                    </span>

                    <input type="password" formControlName="password" placeholder="••••••••"
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20" />
                </div>
            </div>

            <!-- Button -->
            <button type="submit" [disabled]="loginForm.invalid || cargando()"
                class="w-full rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 font-bold text-white shadow-lg shadow-blue-200 transition hover:from-blue-700 hover:to-indigo-700 disabled:cursor-not-allowed disabled:bg-slate-300 disabled:shadow-none">
                @if (cargando()) {
                <span class="flex items-center justify-center">
                    <svg class="h-5 w-5 mr-3 animate-spin border-t-2 border-white rounded-full"
                        viewBox="0 0 24 24"></svg>
                    Cargando...
                </span>
                } @else {
                Entrar
                }
            </button>

            <!-- Register -->
            <p class="text-center text-sm text-slate-600">
                ¿Aún no tienes cuenta?
                <a routerLink="/registro"
                    class="font-bold text-blue-600 hover:text-blue-700 hover:underline transition">
                    Regístrate gratis
                </a>
            </p>

            <!-- Mensaje -->
            @if (mensaje()) {
            <div [ngClass]="mensaje().includes('Bienvenido') ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'"
                class="rounded-xl border p-4 text-center font-medium">
                {{ mensaje() }}
            </div>
            }
        </form>
    </div>
</div>
