<app-navbar></app-navbar>

<div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-100 via-slate-50 to-blue-50">
    <div class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white/90 backdrop-blur p-10 shadow-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="mx-auto mb-4 inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7a4 4 0 108 0 4 4 0 00-8 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 8v6m3-3h-6" />
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold tracking-tight text-slate-800">Crear Cuenta</h2>
            <p class="mt-1 text-slate-500">Únete a OpenMind y gestiona tu biblioteca</p>

            <!-- chips -->
            <div class="mt-4 flex flex-wrap justify-center gap-2">
                <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs text-slate-600">
                    🔒 Registro seguro
                </span>
                <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs text-slate-600">
                    📚 Tu biblioteca en un lugar
                </span>
            </div>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
            <!-- Credenciales -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l9 6 9-6" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 8v10a2 2 0 01-2 2H5a2 2 0 01-2-2V8" />
                            </svg>
                        </span>
                        <input type="email" formControlName="email" placeholder="nombre@ejemplo.com"
                            class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 11c0 .552-.448 1-1 1s-1-.448-1-1 .448-1 1-1 1 .448 1 1z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 11V7a5 5 0 00-10 0v4" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 11h14v8a2 2 0 01-2 2H7a2 2 0 01-2-2v-8z" />
                            </svg>
                        </span>
                        <input type="text" formControlName="password" placeholder="Crea una contraseña segura"
                            class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20">
                    </div>
                    <p class="mt-2 text-xs text-slate-500">Recomendación: 8+ caracteres, mezcla letras y números.</p>
                </div>
            </div>

            <!-- Nombre -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre Completo</label>
                <div class="relative">
                    <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7a4 4 0 108 0 4 4 0 00-8 0z" />
                        </svg>
                    </span>
                    <input type="text" formControlName="nombreCompleto" placeholder="Tu nombre y apellido"
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20">
                </div>
            </div>

            <!-- Ocupación / Edad -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Ocupación</label>
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z" />
                            </svg>
                        </span>
                        <input type="text" formControlName="ocupacion" placeholder="Ej: Estudiante, Docente..."
                            class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Edad</label>
                    <div class="relative">
                        <span
                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 22a10 10 0 110-20 10 10 0 010 20z" />
                            </svg>
                        </span>
                        <input type="number" formControlName="edad" placeholder="Ej: 21"
                            class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20">
                    </div>
                </div>
            </div>

            <!-- Intereses -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Intereses (Separados por coma)</label>
                <div class="relative">
                    <span class="pointer-events-none absolute left-0 top-3 flex items-center pl-4 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                        </svg>
                    </span>
                    <textarea formControlName="intereses" rows="2"
                        placeholder="Ej: Inteligencia artificial, Derecho, Programación..."
                        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 pl-11 text-slate-800 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 resize-none"></textarea>
                </div>
                <p class="mt-2 text-xs text-slate-500">Esto ayuda a recomendarte lecturas y categorías.</p>
            </div>

            <!-- Botón -->
            <button type="submit" [disabled]="registerForm.invalid || cargando()"
                class="w-full rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-3 font-bold text-white shadow-lg shadow-blue-200 transition hover:from-blue-700 hover:to-indigo-700 disabled:bg-slate-300 disabled:shadow-none disabled:cursor-not-allowed">
                {{ cargando() ? 'Procesando...' : 'Registrarse' }}
            </button>

            <p class="text-center text-sm text-slate-600">
                ¿Ya tienes cuenta?
                <a routerLink="/login"
                    class="text-blue-600 font-semibold hover:text-blue-700 hover:underline transition">
                    Inicia sesión
                </a>
            </p>

            @if (mensaje()) {
            <div [ngClass]="mensaje().includes('éxito') ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'"
                class="p-4 rounded-xl border text-center font-medium">
                {{ mensaje() }}
            </div>
            }
        </form>
    </div>
</div>
