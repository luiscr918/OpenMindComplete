<app-navbar></app-navbar>

<div class="contacto">

  <div class="contacto-header">
    <h1>Contáctanos</h1>
    <p>Envíanos tus dudas, sugerencias o comentarios sobre nuestra biblioteca virtual.</p>
  </div>

  <form (ngSubmit)="enviarFormulario()" #contactForm="ngForm" class="contacto-form">

    <div class="form-row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          required
          placeholder="Tu nombre"
          [(ngModel)]="contacto.nombre">
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          required
          placeholder="correo@ejemplo.com"
          [(ngModel)]="contacto.correo">
      </div>
    </div>

    <div class="form-group">
      <label for="mensaje">Mensaje</label>
      <textarea
        id="mensaje"
        name="mensaje"
        rows="5"
        required
        placeholder="Escribe tu mensaje..."
        [(ngModel)]="contacto.mensaje">
      </textarea>
    </div>

    <button type="submit" [disabled]="!contactForm.form.valid">
      Enviar mensaje
    </button>

  </form>

  <div class="info-adicional">
    <h2>Otras formas de contacto</h2>

    <div class="contacto-info">
      <div> soporte@bibliotecavirtual.com</div>
      <div> +1 234 567 890</div>
      <div> Calle de la Lectura 123, Quito, Ecuador</div>
    </div>
  </div>

</div>

<app-footer></app-footer>
