<app-navbar></app-navbar>

<!-- Loading -->
@if(cargando){
<div class="flex items-center justify-center h-[60vh]">
    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
</div>
}

<!-- Card -->
@if (!cargando) {
<div class="min-h-[60vh] flex items-center justify-center px-4 py-12 bg-white">
    <div class="w-full max-w-md">

        <div class="rounded-2xl shadow-xl overflow-hidden" style="border: 1px solid rgba(99,102,241,.2);">

            <!-- Header -->
            <div class="px-6 py-5" style="background: linear-gradient(135deg, rgba(37,99,235,.12), rgba(99,102,241,.15));">
                <div class="flex items-center gap-3">
                    <div class="rounded-full p-2" style="background: linear-gradient(90deg, rgba(37,99,235,.95), rgba(99,102,241,.95));">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold tracking-wide" style="color: rgba(37,99,235,1);">Registrar préstamo</h2>
                </div>
            </div>

            <!-- Contenido -->
            <div class="px-6 py-6 space-y-3 bg-white">

                <!-- Libro -->
                <div class="flex items-start gap-3 p-4 rounded-xl"
                    style="background: rgba(37,99,235,.05); border: 1px solid rgba(37,99,235,.12);">
                    <div class="mt-0.5" style="color: rgba(37,99,235,.8);">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(37,99,235,.6);">Libro</p>
                        <p class="font-medium mt-0.5 text-gray-800">{{ nuevoPrestamo.tituloLibro }}</p>
                    </div>
                </div>

                <!-- Usuario -->
                <div class="flex items-start gap-3 p-4 rounded-xl"
                    style="background: rgba(99,102,241,.05); border: 1px solid rgba(99,102,241,.15);">
                    <div class="mt-0.5" style="color: rgba(99,102,241,.8);">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(99,102,241,.6);">Usuario</p>
                        <p class="font-medium mt-0.5 text-gray-800">{{ nuevoPrestamo.nombreUsuario }}</p>
                    </div>
                </div>

                <!-- Fecha -->
                <div class="flex items-start gap-3 p-4 rounded-xl"
                    style="background: rgba(56,189,248,.05); border: 1px solid rgba(56,189,248,.15);">
                    <div class="mt-0.5" style="color: rgba(56,189,248,.8);">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider" style="color: rgba(56,189,248,.7);">Fecha de salida</p>
                        <p class="font-medium mt-0.5 text-gray-800">{{ nuevoPrestamo.fechaSalida }}</p>
                    </div>
                </div>

            </div>

            <!-- Divider -->
            <div class="h-px mx-6 bg-gray-100"></div>

            <!-- Botones -->
            <div class="px-6 py-5 flex gap-3 bg-white">
                <button (click)="guardarPrestamo(nuevoPrestamo.usuarioId)"
                    class="flex-1 text-white font-semibold py-2.5 rounded-xl transition-all duration-200"
                    style="background: linear-gradient(90deg, rgba(37,99,235,.95), rgba(99,102,241,.95)); box-shadow: 0 4px 15px rgba(37,99,235,.25);"
                    onmouseover="this.style.filter='brightness(1.08)'"
                    onmouseout="this.style.filter='brightness(1)'">
                    Guardar
                </button>

                <button (click)="cancelar()"
                    class="flex-1 font-semibold py-2.5 rounded-xl text-gray-600 transition-all duration-200"
                    style="border: 1px solid rgba(99,102,241,.25); background: white;"
                    onmouseover="this.style.background='rgba(99,102,241,.06)'; this.style.color='rgba(99,102,241,1)'"
                    onmouseout="this.style.background='white'; this.style.color='rgb(75,85,99)'">
                    Cancelar
                </button>
            </div>

        </div>
    </div>
</div>
}

<app-footer></app-footer>
